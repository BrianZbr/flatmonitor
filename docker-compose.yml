version: '3.8'

services:
  flatmonitor:
    build: .
    container_name: flatmonitor
    restart: unless-stopped
    volumes:
      - ./config/domains.yaml:/app/config/domains.yaml:ro
      - ./data:/app/data
      - ./public:/app/public
    environment:
      - FLATMONITOR_CONFIG=/app/config/domains.yaml
    # No ports needed - generates static files to ./public
    # Serve public/ with nginx, caddy, or any static file server

  # Optional: Serve dashboard with Caddy (auto HTTPS)
